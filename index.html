<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelPulse</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav">
  <div class="logo">PixelPulse</div>
  <nav>
    <a href="#announcements">Announcements</a>
    <a href="#blog">Blog</a>
    <a href="#changelog">Changelog</a>
    <a href="#about">About</a>
  </nav>
</header>

<section class="hero">
  <h1>PixelPulse</h1>
  <p>Minecraft DLC • Servers • Content Studio</p>
</section>

<main class="container">

  <section id="announcements" class="card">
    <h2>Announcements</h2>
    <div id="announcements-list"></div>
  </section>

  <section id="blog" class="card">
    <h2>Blog</h2>
    <div id="blog-list"></div>
  </section>

  <section id="changelog" class="card">
    <h2>Changelog</h2>
    <div id="changelog-list"></div>
  </section>

  <section id="about" class="card">
    <h2>About Us</h2>
    <p>
      PixelPulse is a Minecraft content studio building immersive DLCs,
      servers, and custom gameplay systems.
    </p>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
